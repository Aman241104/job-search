services:
  - type: web
    name: job-serach-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && playwright install --with-deps chromium"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
    # Deliberately NOT setting AI_PROVIDER here — it must stay unset so this
    # deployed host always falls back to Gemini (the local Claude Code CLI
    # path in claude_client.py has nothing to shell out to here anyway).
